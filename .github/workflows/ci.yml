name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check src tests
      - run: pytest
      - run: rotation-patterns make-manifests --config configs/smoke.yaml --shard-size 50
      - run: rotation-patterns smoke --config configs/smoke.yaml
      - run: rotation-patterns figures --config configs/smoke.yaml --only figure3
